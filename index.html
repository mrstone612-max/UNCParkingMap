<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNC Reserved Parking Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>UNC Reserved Parking Tracker</h1>
      <p>Only lots marked <strong>reserved</strong> by users are shown below.</p>
    </header>

    <main>
      <section class="card">
        <h2>Mark a lot as reserved</h2>
        <form id="reservationForm" class="grid">
          <label>
            Parking lot name
            <input id="lotName" required placeholder="e.g., Bell Tower Deck" />
          </label>
          <label>
            Reserved until (optional)
            <input id="reservedUntil" type="datetime-local" />
          </label>
          <label>
            Reporter (optional)
            <input id="reporter" placeholder="Your name" />
          </label>
          <label class="span-2">
            Note (optional)
            <input id="note" placeholder="e.g., Reserved for basketball event" />
          </label>
          <button type="submit">Save Reserved Lot</button>
        </form>
        <p id="formMessage" class="note"></p>
      </section>

      <section class="card">
        <h2>Currently marked reserved lots</h2>
        <p class="note">Source: user inputs saved in local database.</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Lot</th>
                <th>Reserved Until</th>
                <th>Reporter</th>
                <th>Note</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="reservedBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
